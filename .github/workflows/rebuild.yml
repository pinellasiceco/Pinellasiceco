name: Rebuild Prospect Tool

on:
  schedule:
    - cron: '0 11 * * *'   # Daily at 11:00 UTC (7am ET)
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl pandas scikit-learn numpy

      - name: Download fresh FL DBPR data
        run: python download_data.py

      - name: Build prospect tool
        run: python build.py data/

      - name: Commit and push
        run: |
          cp prospecting_tool.html index.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js data/snapshot_prev.json || true
          git commit --allow-empty -m "Daily rebuild $(date +'%Y-%m-%d %H:%M')"
          git push
