name: Rebuild Prospect Tool

on:
  push:
    branches: [main, claude/fix-multiple-app-bugs-j1hpJ]
  schedule:
    - cron: '0 11 * * *'   # Daily at 11:00 UTC (7am ET)
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write

concurrency:
  group: rebuild
  cancel-in-progress: true

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl pandas scikit-learn numpy

      - name: Download fresh FL DBPR data
        run: python download_data.py

      - name: Pick up pending source updates from feature branch
        run: |
          git fetch origin claude/fix-multiple-app-bugs-j1hpJ 2>/dev/null || true
          git checkout origin/claude/fix-multiple-app-bugs-j1hpJ -- build.py sw.js send_briefing.py 2>/dev/null || true
          git checkout origin/claude/fix-multiple-app-bugs-j1hpJ -- docs/ 2>/dev/null || true
          git checkout origin/claude/fix-multiple-app-bugs-j1hpJ -- atp/ 2>/dev/null || true
          git checkout origin/claude/fix-multiple-app-bugs-j1hpJ -- scrape_dbpr.py 2>/dev/null || true
          git checkout origin/claude/fix-multiple-app-bugs-j1hpJ -- .github/workflows/scrape_dbpr.yml 2>/dev/null || true
          git checkout origin/claude/fix-multiple-app-bugs-j1hpJ -- generate_citation_summary.py 2>/dev/null || true

      - name: Aggregate citation data (if scraper output exists)
        run: python generate_citation_summary.py 2>/dev/null || echo "No citation data yet — skipping"

      - name: Build prospect tool
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_USER_ID:     ${{ secrets.SUPABASE_USER_ID }}
        run: python build.py data/

      - name: Commit and push
        run: |
          cp prospecting_tool.html index.html
          touch .nojekyll
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          # Restore files that live on main but not in the feature branch
          # (user-uploaded CSVs, scraper output). Without this, git add -A
          # would stage them as deleted and the rebuild push would wipe them.
          git checkout origin/main -- "pinellas v22 to scrape.csv" 2>/dev/null || true
          git checkout origin/main -- pinellas_v22_narratives.csv 2>/dev/null || true
          git checkout origin/main -- scraper_progress.txt 2>/dev/null || true
          git checkout origin/main -- ice_citation_by_business.csv 2>/dev/null || true
          git add -A
          git commit --allow-empty -m "Daily rebuild $(date +'%Y-%m-%d %H:%M')"
          git push origin HEAD:main

      - name: Send daily briefing email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEFING_EMAIL: ${{ secrets.BRIEFING_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python send_briefing.py
