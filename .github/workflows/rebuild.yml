name: Rebuild Prospect Tool

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scikit-learn numpy openpyxl requests

      - name: Download fresh FL data
        run: python download_data.py

      - name: Build prospect tool
        run: python build.py data/

      - name: Commit and push updated tool
        run: |
          git config user.name  "Pinellas Ice Bot"
          git config user.email "bot@pinellasice"
          cp prospecting_tool.html index.html
          git add index.html
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "Weekly rebuild $(date +'%Y-%m-%d')"
            git push
          )
