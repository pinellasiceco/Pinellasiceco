name: Rebuild Prospect Tool

on:
  push:
    branches: [main, claude/fix-multiple-app-bugs-j1hpJ]
  schedule:
    - cron: '0 14 * * *'   # Daily at 14:00 UTC (10am ET) — after DBPR publishes
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write

concurrency:
  group: rebuild
  cancel-in-progress: false  # Never cancel mid-scrape

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl pandas scikit-learn numpy

      - name: Download fresh FL DBPR data
        run: python download_data.py

      - name: Build full violations scrape list
        run: |
          if [ -f build_violations_list.py ]; then
            python build_violations_list.py
          else
            echo "build_violations_list.py not found — skipping"
          fi

      - name: Pick up atp/ landing page from feature branch
        run: |
          git fetch origin claude/fix-multiple-app-bugs-j1hpJ 2>/dev/null || true
          git checkout origin/claude/fix-multiple-app-bugs-j1hpJ -- atp/ 2>/dev/null || true

      - name: Restore scraper output from main
        run: |
          git fetch origin main 2>/dev/null || true
          git checkout origin/main -- pinellas_v22_narratives.csv 2>/dev/null || true
          git checkout origin/main -- scraper_progress.txt 2>/dev/null || true
          git checkout origin/main -- ice_citation_by_business.csv 2>/dev/null || true
          git checkout origin/main -- full_inspection_narratives.json 2>/dev/null || true
          git checkout origin/main -- full_scraper_progress.txt 2>/dev/null || true

      - name: Run DBPR scraper (all Pinellas violations)
        run: |
          if [ -f scrape_dbpr.py ]; then
            MAX_RECORDS=500 python scrape_dbpr.py
          else
            echo "scrape_dbpr.py not found — skipping"
          fi

      - name: Aggregate citation data
        run: |
          if [ -f generate_citation_summary.py ]; then
            python generate_citation_summary.py || echo "Citation summary failed — continuing"
          fi

      - name: Build prospect tool
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_USER_ID:     ${{ secrets.SUPABASE_USER_ID }}
        run: python build.py data/

      - name: Commit and push
        run: |
          cp prospecting_tool.html index.html
          touch .nojekyll
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          # Restore user-uploaded CSV (not generated by CI, must come from main)
          # Scraper outputs are already in working tree from the restore + scraper steps
          git checkout origin/main -- "pinellas v22 to scrape.csv" 2>/dev/null || true
          git add -A -- ':(exclude).github/'
          git commit --allow-empty -m "Daily rebuild $(date +'%Y-%m-%d %H:%M')"
          git push origin HEAD:main

      - name: Send daily briefing email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEFING_EMAIL: ${{ secrets.BRIEFING_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python send_briefing.py

      - name: Export CleanScore data
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python export_cleanscore.py
