name: Scrape DBPR Inspection Narratives

on:
  workflow_dispatch:
    inputs:
      max_records:
        description: 'Max records to scrape this run (0 = all remaining, use 10 for a quick test)'
        required: false
        default: '0'

permissions:
  contents: write

# No cancel-in-progress — a running scrape should never be interrupted by a re-trigger
concurrency:
  group: scrape-dbpr
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour cap; 2,239 records × ~3.5 s ≈ 130 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # No extra packages — scraper uses stdlib only

      - name: Verify input CSV exists
        run: |
          if [ ! -f data/pinellas_v22_to_scrape.csv ]; then
            echo "::error::data/pinellas_v22_to_scrape.csv not found."
            echo "Commit the input CSV to the repo's data/ folder first, then re-run."
            exit 1
          fi
          LINES=$(wc -l < data/pinellas_v22_to_scrape.csv)
          echo "Input CSV found — $LINES lines (including header)"

      - name: Show resume state
        run: |
          if [ -f data/scraper_progress.txt ]; then
            DONE=$(wc -l < data/scraper_progress.txt)
            echo "Resuming — $DONE visit IDs already scraped"
          else
            echo "Fresh run — no prior progress file"
          fi
          if [ -f data/pinellas_v22_narratives.csv ]; then
            ROWS=$(wc -l < data/pinellas_v22_narratives.csv)
            echo "Existing output: $ROWS rows (including header)"
          fi

      - name: Run scraper
        env:
          MAX_RECORDS: ${{ github.event.inputs.max_records }}
        run: python scrape_dbpr.py

      - name: Summarise results
        if: always()
        run: |
          echo "=== Output summary ==="
          if [ -f data/pinellas_v22_narratives.csv ]; then
            TOTAL=$(( $(wc -l < data/pinellas_v22_narratives.csv) - 1 ))
            ICE=$(grep -c ',YES,' data/pinellas_v22_narratives.csv 2>/dev/null || echo 0)
            echo "Total rows written : $TOTAL"
            echo "Ice machine mentions: $ICE"
          else
            echo "No output file found"
          fi
          if [ -f data/scraper_progress.txt ]; then
            echo "Progress entries   : $(wc -l < data/scraper_progress.txt)"
          fi

      - name: Commit results back to main
        if: always()   # commit even on partial runs so progress is saved
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the scraper output files — never touch index.html or app files
          git add data/pinellas_v22_narratives.csv data/scraper_progress.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            ROWS=$(wc -l < data/pinellas_v22_narratives.csv 2>/dev/null || echo '?')
            ICE=$(grep -c ',YES,' data/pinellas_v22_narratives.csv 2>/dev/null || echo '?')
            git commit -m "DBPR scrape — ${ROWS} rows, ${ICE} ice mentions ($(date +'%Y-%m-%d %H:%M UTC'))"
            git push origin HEAD:main
          fi
