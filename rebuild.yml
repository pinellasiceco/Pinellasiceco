name: Rebuild Prospect Tool

on:
  schedule:
    - cron: '0 12 * * 1'   # Every Monday at 12:00 PM UTC (8am ET)
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Download fresh FL DBPR data
        run: python download_data.py

      - name: Build prospect tool
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_USER_ID:     ${{ secrets.SUPABASE_USER_ID }}
        run: python build.py data/

      - name: Send weekly briefing email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEFING_EMAIL: ${{ secrets.BRIEFING_EMAIL }}
        run: python send_briefing.py

      - name: Copy static pages
        run: |
          git checkout origin/main -- atp/           2>/dev/null || true
          git checkout origin/main -- docs/data/     2>/dev/null || true
          git checkout origin/main -- docs/report/   2>/dev/null || true
          git checkout origin/main -- docs/explore/  2>/dev/null || true
          git checkout origin/main -- docs/history/  2>/dev/null || true

      - name: Commit and push
        run: |
          cp prospecting_tool.html index.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js data/snapshot_prev.json docs/data/ docs/report/ docs/explore/ docs/history/ atp/ || true
          git commit --allow-empty -m "Weekly rebuild $(date +'%Y-%m-%d')"
          git push
