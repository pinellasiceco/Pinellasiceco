name: Rebuild Prospect Tool

on:
  schedule:
    - cron: '0 12 * * 1'   # Every Monday at 12:00 PM UTC (8am ET)
  workflow_dispatch:         # Manual trigger

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Download fresh FL DBPR data
        run: python download_data.py

      - name: Build prospect tool
        run: |
          # Auto-find all CSV/XLSX files in data/ folder
          python build.py data/

      - name: Send weekly briefing email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEFING_EMAIL: ${{ secrets.BRIEFING_EMAIL }}
        run: python send_briefing.py

      - name: Deploy to GitHub Pages
        run: |
          cp prospecting_tool.html index.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js data/snapshot_prev.json || true
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Weekly rebuild $(date +'%Y-%m-%d')" && git push
