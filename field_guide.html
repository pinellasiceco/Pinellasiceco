<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Execution Guide | Pinellas Ice Co</title>

<style>
:root {
  --bg:#0f1115;
  --card:#171923;
  --text:#e6e8ef;
  --muted:#9aa3b2;
  --border:#2a2f3a;
  --green:#16c185;
  --red:#ff4d4f;
  --yellow:#f5c542;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px 20px 90px;
}

/* HEADER */
.hdr-title {font-size:22px;font-weight:600;}
.hdr-sub {font-size:13px;color:var(--muted);margin-bottom:15px;}

/* ACTIONS */
.quick-actions {display:flex;gap:10px;margin-bottom:15px;}
.btn {
  flex:1;padding:10px;border-radius:8px;text-align:center;
  font-size:13px;font-weight:600;text-decoration:none;
}
.call {background:var(--green);color:#000;}
.schedule {background:var(--card);border:1px solid var(--border);}

/* URGENCY BAR */
.urgency {
  padding:12px;
  border-radius:8px;
  margin-bottom:15px;
  font-size:14px;
  font-weight:600;
}

/* SCORE */
.score-box {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:20px;
  text-align:center;
  margin-bottom:15px;
}
.score {
  font-size:40px;
  font-weight:700;
}
.score-sub {
  font-size:12px;
  color:var(--muted);
}

/* SLIDER */
.slider {
  position:relative;
  overflow:hidden;
  border-radius:10px;
  margin-bottom:20px;
}
.slider img {
  width:100%;
  display:block;
}
.slider-top {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}
.slider-handle {
  position:absolute;
  top:0;
  left:50%;
  width:3px;
  height:100%;
  background:#fff;
  cursor:ew-resize;
}

/* SECTIONS */
.nav {display:flex;gap:8px;overflow-x:auto;margin:10px 0 20px;}
.pill {
  padding:8px 12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

.section {margin:25px 0;}
.section-title {font-size:15px;font-weight:600;margin-bottom:10px;}

.block {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:10px;
}
.block-header {padding:12px;cursor:pointer;}
.block-content {
  padding:12px;
  border-top:1px solid var(--border);
  display:none;
}

/* STICKY */
.sticky-bar {
  position:fixed;bottom:0;left:0;width:100%;
  display:flex;border-top:1px solid var(--border);
  background:#0b0d12;
}
.sticky-btn {
  flex:1;padding:14px;text-align:center;
  font-weight:600;text-decoration:none;
}
.primary {background:var(--green);color:#000;}
.secondary {color:var(--text);}
</style>

<script>
function toggle(el){
  const c = el.nextElementSibling;
  c.style.display = c.style.display === 'block' ? 'none' : 'block';
}

/* SCORE + URGENCY */
function setScore(score){
  const el = document.getElementById('score');
  const bar = document.getElementById('urgency');

  el.innerText = score;

  if(score > 80){
    bar.style.background = "#1f3d2b";
    bar.innerText = "LOW RISK — Within acceptable range";
  } else if(score > 50){
    bar.style.background = "#4a3f1c";
    bar.innerText = "ELEVATED — Trending toward compliance issue";
  } else {
    bar.style.background = "#4a1c1c";
    bar.innerText = "HIGH RISK — Likely to fail inspection";
  }
}

/* SLIDER */
function initSlider(){
  const slider = document.querySelector('.slider');
  const top = document.querySelector('.slider-top');
  const handle = document.querySelector('.slider-handle');

  slider.addEventListener('mousemove', e => {
    let x = e.offsetX;
    top.style.width = x + 'px';
    handle.style.left = x + 'px';
  });

  slider.addEventListener('touchmove', e => {
    let rect = slider.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left;
    top.style.width = x + 'px';
    handle.style.left = x + 'px';
  });
}

window.onload = function(){
  setScore(42); // 🔥 CHANGE THIS ON SITE
  initSlider();
}
</script>

</head>

<body>

<div class="container">

<div class="hdr-title">Field Execution Guide</div>
<div class="hdr-sub">Close First. Explain Less.</div>

<div class="quick-actions">
  <a href="tel:17278556873" class="btn call">📞 Call</a>
  <a href="https://meetings-na2.hubspot.com/stripe/ice-machine-on-site?uuid=7f45cc01-5b40-43b1-a890-95b2c5b337fb" class="btn schedule">📅 Schedule</a>
</div>

<!-- URGENCY -->
<div id="urgency" class="urgency"></div>

<!-- SCORE -->
<div class="score-box">
  <div id="score" class="score">--</div>
  <div class="score-sub">Inspection Score</div>
</div>

<!-- SLIDER -->
<div class="slider">
  <img src="AFTER-IMAGE-URL">
  <div class="slider-top">
    <img src="BEFORE-IMAGE-URL">
  </div>
  <div class="slider-handle"></div>
</div>

<!-- OFFER SECTION -->
<div class="section">
  <div class="section-title">Close</div>

  <div class="block">
    <div class="block-header" onclick="toggle(this)">Offer</div>
    <div class="block-content">
      Basic — $99<br>
      Full Reset — $349<br><br>
      “Let’s go ahead and take care of the full reset.”
    </div>
  </div>

  <div class="block">
    <div class="block-header" onclick="toggle(this)">Monthly</div>
    <div class="block-content">
      $149/month — we handle everything<br><br>
      “I’ll set that up — best card?”
    </div>
  </div>

</div>

</div>

<div class="sticky-bar">
  <a href="https://meetings-na2.hubspot.com/stripe/ice-machine-on-site?uuid=7f45cc01-5b40-43b1-a890-95b2c5b337fb" class="sticky-btn secondary">Schedule</a>
  <a href="tel:17278556873" class="sticky-btn primary">Call Now</a>
</div>

</body>
</html>
